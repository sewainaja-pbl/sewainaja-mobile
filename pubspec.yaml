# ================================================================================
# ## FINAL AI AGENT PROMPT SPEC:SEWAINAJA - SISTEM REKOMENDASI MACHINE LEARNING
# ================================================================================
#
# ## 1. ARSITEKTUR INTI & INTEGRASI
# - Tipe Arsitektur: Opsi B (Integrasi dinamis real-time menggunakan Firebase Admin SDK)
# - Framework Backend: FastAPI (Python 3.10+)
# - Sumber Database: Firebase Firestore
# - Kredensial Database: ml_backend/firebase-credentials.json (DIABAIKAN di .gitignore)
# - Paket Python Utama: fastapi, uvicorn, scikit-surprise, scikit-learn, pandas, firebase-admin
#
# ## 2. ENDPOINT & SKENARIO REKOMENDASI
#
# ### A. Rekomendasi Halaman Beranda / Home Screen (/recommend)
# - Endpoint: POST `/recommend`
# - Payload: { "userId": "String (opsional)" }
# - Logika ML:
#   - Pengguna Aktif (User lama): Jika riwayat transaksi/rating ada, lakukan Collaborative Filtering SVD.
#   - Pengguna Baru (Cold Start Fallback): Tampilkan rekomendasi berdasarkan kepopuleran
#     atau rating rata-rata dari barang yang aktif (tersedia), diprioritaskan dari kategori yang paling sering disewa.
#
# ### B. Rekomendasi Detail Barang & Pencarian (/search-recommend)
# - Endpoint: POST `/search-recommend`
# - Payload: { "itemId": "String" }
# - Logika ML:
#   - Menggunakan Content-Based Filtering dengan membaca TF-IDF Matrix & Cosine Similarity yang sudah di-prekomputasi (cached).
#   - Menganalisis kemiripan teks pada kolom "name", "description", dan "categoryName" dari koleksi Firestore "items".
#   - Hanya menampilkan barang-barang dengan status "available".
#
# ### C. Operasional Training & Tuning (/train) - DIJALANKAN TERPISAH
# - Endpoint: POST `/train` (Dikhususkan untuk Admin / Cron Job berkala)
# - Logika ML:
#   - Menarik data terbaru dari Firestore.
#   - Melakukan pre-komputasi (caching) TF-IDF Matrix untuk mempercepat `/search-recommend`.
#   - Mengeksekusi proses Hypertuning (Random Search) SVD dan Pengecekan Overfit/Underfit (Tolak model jika selisih Test vs Train RMSE > 0.15).
#   - Menyimpan parameter terbaik ke dalam model (.pkl atau memori).
# - Tujuan: Memastikan endpoint prediksi (/recommend) sangat cepat (milidetik) karena terbebas dari beban komputasi training.
#
# ## 3. HYPERPARAMETER TUNING & SPESIFIKASI FITTING
# - Algoritma Model: SVD (Singular Value Decomposition) dari `scikit-surprise`
# - Strategi Tuning: Random Search (RandomizedSearchCV)
# - Kisi Hyperparameter (Grid):
#   - `n_factors` (jumlah faktor laten): [10, 50, 100]
#   - `lr_all` (learning rate): [0.002, 0.005, 0.01]
#   - `reg_all` (regularization / penalti): [0.02, 0.05, 0.1, 0.2] (Diperluas untuk mencegah overfit)
# - Metrik Evaluasi: Root Mean Squared Error (RMSE) & Mean Absolute Error (MAE)
# - Protokol Validasi: Pembagian Train-Test 80/20 atau Cross Validation 5-Fold
# - Diagnosis Fitting Model:
#   - Good Fit: RMSE Latih (Train) Rendah & RMSE Uji (Test) Rendah (selisih < 0.05)
#   - Overfitting: RMSE Latih sangat rendah & RMSE Uji tinggi -> Tindakan: Kurangi n_factors atau naikkan reg_all.
#   - Underfitting: RMSE Latih tinggi & RMSE Uji tinggi -> Tindakan: Naikkan n_factors atau latih dengan epoch lebih banyak.
#
# ## 4. ASUMPSI SKEMA DATABASE (FIRESTORE)
# - Koleksi `items`:
#   - Kolom: { "id", "name", "description", "categoryName", "status" ("available"), "ownerRating", "photos" }
# - Koleksi `user_interactions` / `ratings`:
#   - Kolom: { "userId", "itemId", "rating" (1 sampai 5) }
#   - Pemetaan Interaksi Implisit (Jika rating tidak diisi langsung oleh user):
#     - Melihat Barang (View) = 1
#     - Menambahkan Favorit = 3
#     - Transaksi Sewa (Rent) = 5
#     - PENTING (Pre-processing): Jika user memiliki beberapa aksi ke barang yang sama, gunakan nilai maksimum (group by max).
# ================================================================================

