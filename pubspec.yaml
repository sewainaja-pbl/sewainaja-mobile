name: sewainaja
description: 'A new Flutter project.'
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  firebase_core: ^4.7.0
  firebase_auth: ^6.4.0
  cloud_firestore: ^6.3.0
  firebase_messaging: ^16.2.0
  # Package untuk membuat Native Splash Screen
  flutter_native_splash: ^2.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

# ==========================================
# KONFIGURASI FLUTTER LAUNCHER ICONS
# ==========================================
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/logo-white.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/logo.png"
  min_sdk_android: 21

# ==========================================
# KONFIGURASI FLUTTER NATIVE SPLASH
# ==========================================
flutter_native_splash:
  # Background color: menggunakan warna gelap dari radial gradient (#012D1D)
  # agar transisi dari native splash ke animated splash tidak patah/flicker
  color: '#012D1D'
  image: assets/images/logo.png
  android_12:
    color: '#012D1D'
    image: assets/images/logo.png
  ios: true

flutter:
  uses-material-design: true

  # Mendaftarkan folder aset gambar
  assets:
    - assets/images/

  # Mendaftarkan custom fonts
  fonts:
    - family: BebasNeue
      fonts:
        - asset: assets/fonts/BebasNeue-Regular.ttf
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Light.ttf
          weight: 300
        - asset: assets/fonts/Poppins-Regular.ttf
          weight: 400
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700

