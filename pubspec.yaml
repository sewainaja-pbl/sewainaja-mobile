name: sewainaja
description: 'A new Flutter project.'
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  firebase_core: ^4.7.0
  firebase_auth: ^6.4.0
  cloud_firestore: ^6.3.0
  firebase_messaging: ^16.2.0
  # Package untuk membuat Native Splash Screen
  flutter_native_splash: ^2.4.0
  animate_do: ^5.1.0
  font_awesome_flutter: ^11.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

# ==========================================
# KONFIGURASI FLUTTER LAUNCHER ICONS
# ==========================================
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/logo-white.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/logo.png"
  min_sdk_android: 21

# ==========================================
# KONFIGURASI FLUTTER NATIVE SPLASH
# ==========================================
flutter_native_splash:
  # Background color: menggunakan warna gelap dari radial gradient (#012D1D)
  # agar transisi dari native splash ke animated splash tidak patah/flicker
  color: '#012D1D'
  image: assets/images/logo.png
  android_12:
    color: '#012D1D'
    image: assets/images/logo.png
  ios: true

flutter:
  uses-material-design: true

  # Mendaftarkan folder aset gambar
  assets:
    - assets/images/

  # Mendaftarkan custom fonts
  fonts:
    - family: BebasNeue
      fonts:
        - asset: assets/fonts/BebasNeue-Regular.ttf
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Light.ttf
          weight: 300
        - asset: assets/fonts/Poppins-Regular.ttf
          weight: 400
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700

# =============================================================
# ##  SEWAINAJA - CUSTOM BOTTOM NAVBAR (UPDATED)
# =============================================================
# Name: SewaIn Aja - Custom Floating Navbar
# Description: Navbar melayang berbentuk pill dengan 5 menu utama dan indikator aktif berbentuk lingkaran terang.
# Theme: Premium Clean & Minimalist (Green Forest Palette)

# -------------------------------------------------------------
# ## DEPENDENCIES SYNC
# -------------------------------------------------------------
# Komponen ini membutuhkan varian icon outline (inactive) dan solid/bold (active).
# 1. Home: solar:home-2-bold / solar:home-2-linear
# 2. Category: tabler:category
# 3. Add Listing: basil:add-outline
# 4. Chat: lets-icons:chat-alt-3-fill / lets-icons:chat-alt-3
# 5. Profile: material-symbols:person-rounded

# =============================================================
# ## UI STRUCTURE NODES
# =============================================================

# ### [MAIN NAVBAR CONTAINER]
# ID: '201:2650' -> Container Utama
# Layout: Fixed Width (~348px) / Responsif merenggang dengan margin horizontal, Height: 75px
# Background: #012D1D (Deep Forest Green)
# Shape: Pill (BorderRadius: 40px)
# Position: Mengambang di bawah layar menggunakan Align(bottomCenter) + SafeArea Padding.

# ### [MENU ITEMS (ROW LAYOUT)]
# Deskripsi: Berisi 5 item dengan jarak seimbang (MainAxisAlignment.spaceEvenly).
# Ukuran Lingkaran per Item (Ellipse): Width 65px, Height 65px (Menyesuaikan padding container)

# --- 1. ITEM: HOME SCREEN ---
# Active State (ID '217:2152'): 
# - Circle Background: #FFF8EF | Icon: solar:home-2-bold (Color: #012D1D)
# Inactive State:
# - Circle Background: #1B4332 | Icon: solar:home-2-linear (Color: #FFF8EF)

# --- 2. ITEM: CATEGORIES ---
# Active State (ID '217:2154'):
# - Circle Background: #FFF8EF | Icon: tabler:category (Color: #012D1D)
# Inactive State:
# - Circle Background: #1B4332 | Icon: tabler:category (Color: #FFF8EF)

# --- 3. ITEM: TAMBAH BARANG (ADD LISTING) ---
# Active State (ID '217:2180'):
# - Circle Background: #FFF8EF | Icon: basil:add-outline (Color: #012D1D, StrokeWeight: 2px)
# Inactive State:
# - Circle Background: #1B4332 | Icon: basil:add-outline (Color: #FFF8EF)

# --- 4. ITEM: CHAT ---
# Active State (ID '217:2258'):
# - Circle Background: #FFF8EF | Icon: lets-icons:chat-alt-3-fill (Color: #012D1D)
# Inactive State:
# - Circle Background: #1B4332 | Icon: lets-icons:chat-alt-3 (Color: #FFF8EF)

# --- 5. ITEM: PROFILE ---
# Active State (ID '217:2284'):
# - Circle Background: #FFF8EF | Icon: material-symbols:person-rounded (Color: #012D1D)
# Inactive State:
# - Circle Background: #1B4332 | Icon: material-symbols:person-rounded (Color: #FFF8EF)

# =============================================================
# ## GLOBAL STYLE DEFINITIONS
# =============================================================
# Color_Navbar_Bg: "#012D1D" (Deep Forest Green)
# Color_Active_Bg: "#FFF8EF" (Cream White)
# Color_Inactive_Bg: "#1B4332" (Medium Forest Green)
# Color_Active_Icon: "#012D1D" (Deep Forest Green)
# Color_Inactive_Icon: "#FFF8EF" (Cream White)

# -------------------------------------------------------------
# ## LAYOUT RULES & STATE MANAGEMENT (CRITICAL)
# -------------------------------------------------------------
# 1. State Management: Gunakan variabel `selectedIndex` untuk melacak tab aktif (0 hingga 4).
# 2. Main Wrapper: Gunakan `IndexedStack` di dalam `Scaffold` utama untuk menampung kelima layar (Home, Category, Add, Chat, Profile) agar state tiap layar tidak ter-reset.
# 3. Floating Behavior: Set `extendBody: true` pada Scaffold utama agar konten bisa memanjang ke belakang navbar.
# 4. CONTENT WHITESPACE (PENTING): Karena navbar melayang, WAJIB tambahkan `padding: EdgeInsets.only(bottom: 110)` atau `SizedBox(height: 110)` di bagian paling bawah pada list/konten di SETIAP screen yang ada di dalam IndexedStack. Ini agar konten terakhir dapat di-scroll hingga melewati batas navbar dan tidak tertutup.
# 5. Animation: Gunakan `AnimatedContainer` untuk setiap latar lingkaran item menu agar transisi warna saat berpindah tab terlihat halus (Duration: ~200ms).

